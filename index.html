<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Результат тренування</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222222;
    --border: #2e2e2e; --accent: #4f8ef7; --accent-dim: rgba(79,142,247,0.12);
    --text: #f0f0f0; --muted: #888; --success: #3ecf8e; --error: #f56565; --warning: #f6ad55;
  }
  body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem 2rem; }

  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .header-icon { width: 40px; height: 40px; background: var(--accent-dim); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 1rem; }
  .card-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .card-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .card-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .card-value { font-size: 14px; font-weight: 600; text-align: right; }

  .section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  .btn { width: 100%; padding: 15px; font-size: 15px; font-weight: 700; font-family: 'Manrope', sans-serif; border: none; border-radius: 14px; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger  { background: var(--error);   color: #fff; }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  .reasons { display: none; margin-top: 0.5rem; }
  .reasons.show { display: block; }
  .reason-btn { width: 100%; padding: 13px 16px; font-size: 14px; font-weight: 600; font-family: 'Manrope', sans-serif; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; margin-bottom: 8px; text-align: left; transition: border-color 0.2s, background 0.2s; }
  .reason-btn:active { background: var(--surface2); border-color: var(--error); }

  .done-screen { display: none; text-align: center; padding: 3rem 1rem; }
  .done-screen.show { display: block; }
  .done-icon { font-size: 56px; margin-bottom: 1rem; }
  .done-screen h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .done-screen p { font-size: 14px; color: var(--muted); }

  .main-screen { }
  .loading { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--error); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loadingScreen" class="loading">⏳ Завантаження...</div>

<div id="mainScreen" class="main-screen" style="display:none">
  <div class="header">
    <div class="header-icon">⚽</div>
    <div>
      <h1>Результат пробного</h1>
      <p id="headerDate">—</p>
    </div>
  </div>

  <div class="card" style="margin-bottom:1.25rem">
    <div class="card-row">
      <span class="card-label">👤 Дитина</span>
      <span class="card-value" id="infoName">—</span>
    </div>
    <div class="card-row">
      <span class="card-label">📅 Рік народження</span>
      <span class="card-value" id="infoBirth">—</span>
    </div>
    <div class="card-row">
      <span class="card-label">📞 Телефон</span>
      <span class="card-value" id="infoPhone">—</span>
    </div>
    <div class="card-row">
      <span class="card-label">👥 Група</span>
      <span class="card-value" id="infoGroup">—</span>
    </div>
  </div>

  <p class="section-title">Оберіть результат</p>

  <button class="btn btn-success" onclick="handleResult('will')">✅ Буде ходити</button>
  <button class="btn btn-danger"  onclick="showReasons()">❌ Не буде ходити</button>
  <button class="btn btn-warning" onclick="handleResult('no')">🚫 Не прийшов</button>

  <div class="reasons" id="reasonsBlock">
    <p class="section-title" style="margin-top:0.5rem">Причина відмови</p>
    <button class="reason-btn" onclick="handleResult('not', 'Не підходить локація')">📍 Не підходить локація</button>
    <button class="reason-btn" onclick="handleResult('not', 'Не підходить рівень')">⚽️ Не підходить рівень</button>
    <button class="reason-btn" onclick="handleResult('not', 'Дорого')">💰 Дорого</button>
    <button class="reason-btn" onclick="handleResult('not', 'Інша причина')">❓ Інша причина</button>
  </div>
</div>

<div id="doneScreen" class="done-screen">
  <div class="done-icon" id="doneIcon">✅</div>
  <h2 id="doneTitle">Записано!</h2>
  <p id="doneText">Результат збережено в таблицю</p>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoB-D7s3PROlFtZ_zsvxbJuLhSYQd6vdae8SNVCt8Gwaf-hc6-gKZhdEivBPsppJI22A/exec';

  const params   = new URLSearchParams(window.location.search);
  const rowIdx   = params.get('row');
  const sheetName = params.get('sheet') || 'Заявки';

  let rowData = null;
  let submitted = false;

  async function loadData() {
    if (!rowIdx) {
      document.getElementById('loadingScreen').textContent = '❌ Невірне посилання';
      return;
    }
    try {
      const res = await fetch(`${SCRIPT_URL}?action=getRow&row=${rowIdx}&sheet=${encodeURIComponent(sheetName)}`);
      const json = await res.json();
      if (!json.success) throw new Error();
      rowData = json.data;
      renderData();
    } catch (e) {
      document.getElementById('loadingScreen').textContent = '❌ Помилка завантаження';
    }
  }

  function renderData() {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';

    document.getElementById('infoName').textContent  = rowData['child_full_name'] || '—';
    document.getElementById('infoBirth').textContent = rowData['child_birth_year'] || '—';
    document.getElementById('infoPhone').textContent = rowData['phone'] || '—';
    document.getElementById('infoGroup').textContent = rowData['group'] || '—';

    const date = rowData['Дата пробного тренування'] || rowData['trial_date'] || '';
    document.getElementById('headerDate').textContent = date ? `Тренування: ${date}` : 'Пробне тренування';
  }

  function showReasons() {
    document.getElementById('reasonsBlock').classList.toggle('show');
  }

  async function handleResult(action, reason) {
    if (submitted) return;
    submitted = true;

    disableAllButtons();

    try {
      await fetch(`${SCRIPT_URL}?action=setResult&row=${rowIdx}&sheet=${encodeURIComponent(sheetName)}&result=${action}&reason=${encodeURIComponent(reason || '')}`, {
        mode: 'no-cors'
      });
      showDone(action, reason);
    } catch (e) {
      submitted = false;
      enableAllButtons();
      showToast('Помилка. Спробуйте ще раз.');
    }
  }

  function showDone(action, reason) {
    document.getElementById('mainScreen').style.display = 'none';
    const done = document.getElementById('doneScreen');
    done.classList.add('show');

    const icons  = { will: '✅', not: '❌', no: '🚫' };
    const titles = { will: 'Буде ходити!', not: 'Не буде ходити', no: 'Не прийшов' };
    const texts  = {
      will: 'Клієнт записаний як активний',
      not:  reason ? `Причина: ${reason}` : 'Результат збережено',
      no:   'Надіслано сповіщення менеджеру'
    };

    document.getElementById('doneIcon').textContent  = icons[action];
    document.getElementById('doneTitle').textContent = titles[action];
    document.getElementById('doneText').textContent  = texts[action];
  }

  function disableAllButtons() {
    document.querySelectorAll('.btn, .reason-btn').forEach(b => b.disabled = true);
  }
  function enableAllButtons() {
    document.querySelectorAll('.btn, .reason-btn').forEach(b => b.disabled = false);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadData();
</script>
</body>
</html>
